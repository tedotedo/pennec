<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>PENNEC — Social card 1200x630</title>
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ec; }
</style>
</head>
<body>

<div data-composition-id="pennec-og" data-width="1200" data-height="630" data-start="0" data-duration="1">

  <div class="bg">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <div class="rule rule-top"></div>
    <div class="rule rule-bottom"></div>
  </div>

  <div class="card">
    <div class="card-left">
      <div class="mark">
        <svg viewBox="0 0 120 120" width="104" height="104">
          <rect width="120" height="120" rx="28" fill="#0f2a44"/>
          <path d="M18 74 C38 44, 62 92, 82 62 S 104 44, 104 44" fill="none" stroke="#f4c05e" stroke-width="7" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="eyebrow">Paediatric Epilepsy Network</p>
      <h1 class="title">
        <span>Better</span> <span>epilepsy</span><br/>
        <span>care</span> <span>for</span> <span>every</span><br/>
        <span class="accent">child.</span>
      </h1>
      <div class="underline"></div>
      <p class="sub">North East of England &amp; Cumbria</p>
    </div>

    <div class="card-right">
      <p class="brand">PENNEC</p>
      <p class="brand-meta">Part of the Children's Health<br/>&amp; Wellbeing Network (CHWN)</p>

      <div class="stats">
        <div class="stat">
          <span class="n">1 in 200</span>
          <span class="l">children in the UK<br/>live with epilepsy</span>
        </div>
        <div class="stat">
          <span class="n">12<em>+</em></span>
          <span class="l">trusts collaborating<br/>across the region</span>
        </div>
      </div>

      <p class="url">tedotedo.github.io/pennec</p>
    </div>
  </div>

  <style>
    [data-composition-id="pennec-og"] {
      position: relative;
      width: 1200px; height: 630px;
      background: #fbf6ec;
      overflow: hidden;
      font-family: "Inter", system-ui, sans-serif;
      color: #0f2a44;
    }
    [data-composition-id="pennec-og"] .bg { position: absolute; inset: 0; z-index: 0; }
    [data-composition-id="pennec-og"] .glow { position: absolute; border-radius: 50%; filter: blur(70px); opacity: .5; }
    [data-composition-id="pennec-og"] .glow-a {
      width: 620px; height: 620px;
      background: radial-gradient(circle, rgba(244,192,94,.85), rgba(244,192,94,0) 70%);
      top: -180px; right: -160px;
    }
    [data-composition-id="pennec-og"] .glow-b {
      width: 540px; height: 540px;
      background: radial-gradient(circle, rgba(207,224,212,.7), rgba(207,224,212,0) 70%);
      bottom: -200px; left: -160px;
    }
    [data-composition-id="pennec-og"] .rule {
      position: absolute; left: 72px; right: 72px; height: 1px; background: rgba(15,42,68,.14);
    }
    [data-composition-id="pennec-og"] .rule-top { top: 48px; }
    [data-composition-id="pennec-og"] .rule-bottom { bottom: 48px; }

    [data-composition-id="pennec-og"] .card {
      position: absolute; inset: 0;
      display: grid; grid-template-columns: 1.35fr 1fr;
      padding: 80px 80px;
      gap: 48px;
      box-sizing: border-box;
      z-index: 2;
    }
    [data-composition-id="pennec-og"] .card-left { display: flex; flex-direction: column; justify-content: center; }
    [data-composition-id="pennec-og"] .mark { margin-bottom: 28px; }
    [data-composition-id="pennec-og"] .mark svg { display: block; }
    [data-composition-id="pennec-og"] .eyebrow {
      font-weight: 600; text-transform: uppercase; letter-spacing: .22em;
      font-size: 16px; color: #d89c2e; margin: 0 0 18px;
    }
    [data-composition-id="pennec-og"] .title {
      font-family: "Fraunces", serif; font-weight: 700;
      font-size: 76px; line-height: .98; letter-spacing: -.02em;
      color: #0f2a44; margin: 0 0 18px;
    }
    [data-composition-id="pennec-og"] .title .accent { font-style: italic; color: #d89c2e; }
    [data-composition-id="pennec-og"] .underline {
      width: 120px; height: 4px; background: #f4c05e; border-radius: 4px; margin-bottom: 18px;
    }
    [data-composition-id="pennec-og"] .sub {
      font-size: 22px; color: #4a5568; margin: 0; font-weight: 500;
    }

    [data-composition-id="pennec-og"] .card-right {
      background: #0f2a44; color: #fff;
      border-radius: 22px;
      padding: 36px 34px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative;
    }
    [data-composition-id="pennec-og"] .brand {
      font-family: "Fraunces", serif; font-weight: 700;
      font-size: 48px; letter-spacing: .05em;
      color: #fff; margin: 0 0 8px;
    }
    [data-composition-id="pennec-og"] .brand-meta {
      font-size: 14px; font-weight: 500; color: #c8d3e1;
      letter-spacing: .06em; text-transform: uppercase; line-height: 1.5;
      margin: 0;
    }
    [data-composition-id="pennec-og"] .stats {
      display: flex; flex-direction: column; gap: 22px;
    }
    [data-composition-id="pennec-og"] .stat { display: flex; flex-direction: column; gap: 6px; }
    [data-composition-id="pennec-og"] .stat .n {
      font-family: "Fraunces", serif; font-weight: 700;
      font-size: 56px; line-height: 1; color: #fff;
      font-variant-numeric: tabular-nums; letter-spacing: -.02em;
    }
    [data-composition-id="pennec-og"] .stat .n em { color: #f4c05e; font-style: normal; }
    [data-composition-id="pennec-og"] .stat .l {
      font-size: 13px; color: #c8d3e1; line-height: 1.4;
      text-transform: uppercase; letter-spacing: .12em; font-weight: 500;
    }
    [data-composition-id="pennec-og"] .url {
      font-size: 14px; color: #f4c05e; margin: 0;
      letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
      border-top: 1px solid rgba(255,255,255,.12); padding-top: 14px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.to({}, { duration: 1 });
    window.__timelines["pennec-og"] = tl;
  </script>
</div>

</body>
</html>
